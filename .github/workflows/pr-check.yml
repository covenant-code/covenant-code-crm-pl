name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'          # кэширует node_modules между запусками — аналог Maven cache

      - name: Install dependencies
        run: npm ci             # ci = чистая установка строго по package-lock.json (не npm install)

      - name: Lint
        run: npm run lint       # ESLint проверяет качество кода

      - name: Build
        run: npm run build      # убеждаемся что production-сборка не падает с ошибками
