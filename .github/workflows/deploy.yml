name: Deploy to Production

on:
  push:
    branches: [main]

# Гарантирует что одновременно идёт только один деплой.
# cancel-in-progress: false — если деплой уже идёт, новый будет ждать, а не отменять его.
# Аналогия: как @Lock в Spring для критических секций.
concurrency:
  group: production-deploy-frontend
  cancel-in-progress: false

permissions:
  contents: read
  packages: write              # нужно для push в GitHub Container Registry

env:
  IMAGE_NAME: crm-frontend
  STACK_NAME: cccrm-pl
  SERVICE_NAME: cccrm-pl_crm-frontend

jobs:
  # ── Job 1: Сборка и публикация Docker-образа ────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Два тега: sha (неизменяемый, для rollback) + latest (удобный алиас)
          tags: |
            ${{ secrets.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          # GHA cache ускоряет повторные сборки — кэширует слои Docker между запусками
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Деплой на сервер и верификация ───────────────────────────────────
  deploy:
    name: Deploy & Verify
    runs-on: ubuntu-latest
    needs: build-and-push       # запускается только после успешного job 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy stack file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-stack.yml
          target: /opt/cccrm-pl/

      - name: Deploy and verify rollout
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            REGISTRY="${{ secrets.REGISTRY }}/${{ github.repository_owner }}"
            FRONTEND_IMAGE_TAG="${{ github.sha }}"
            SERVICE="${{ env.SERVICE_NAME }}"
            STACK="${{ env.STACK_NAME }}"
            NEW_IMAGE="$REGISTRY/${{ env.IMAGE_NAME }}:$FRONTEND_IMAGE_TAG"

            export REGISTRY
            export FRONTEND_IMAGE_TAG

            echo "==> Logging in to registry on server"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ secrets.REGISTRY }} \
              -u ${{ github.actor }} --password-stdin

            echo "==> Deploying image: $NEW_IMAGE"
            docker stack deploy -c /opt/cccrm-pl/docker-stack.yml "$STACK" --with-registry-auth

            # Мониторим rollout 2 минуты (фронтенд стартует быстро — достаточно 120s)
            echo "==> Monitoring rollout (max 2 min)..."
            MAX_WAIT=120
            INTERVAL=10
            ELAPSED=0

            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              REPLICAS=$(docker service ls --filter "name=$SERVICE" --format "{{.Replicas}}" 2>/dev/null | head -1)
              REPLICAS="${REPLICAS:-0/0}"
              RUNNING=$(echo "$REPLICAS" | cut -d'/' -f1 | tr -d '[:space:]')
              DESIRED=$(echo "$REPLICAS" | cut -d'/' -f2 | tr -d '[:space:]')

              set +o pipefail
              TASK_STATES=$(docker service ps "$SERVICE" --no-trunc \
                --format "{{.Image}} {{.CurrentState}}" 2>/dev/null || true)
              FAILED=$(echo "$TASK_STATES" | grep -F "$FRONTEND_IMAGE_TAG" | grep -cE "Failed|Rejected" 2>/dev/null || echo "0")
              FAILED=$(echo "$FAILED" | head -1 | tr -d '[:space:]')
              FAILED="${FAILED:-0}"
              set -o pipefail

              echo "  [${ELAPSED}s] Replicas: $REPLICAS | Failed new tasks: $FAILED"

              if [ "$FAILED" -gt 0 ]; then
                echo "==> ERROR: container failed to start — rolling back"
                docker service rollback "$SERVICE" || true
                exit 1
              fi

              if [ -n "$DESIRED" ] && [ "$DESIRED" -gt 0 ] && [ "$RUNNING" = "$DESIRED" ]; then
                SPEC_IMAGE=$(docker service inspect "$SERVICE" \
                  --format '{{.Spec.TaskTemplate.ContainerSpec.Image}}' 2>/dev/null || echo "")
                if echo "$SPEC_IMAGE" | grep -q "$FRONTEND_IMAGE_TAG"; then
                  echo "==> Deployment successful: $DESIRED replica(s) running"
                  exit 0
                fi
              fi

              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            echo "==> ERROR: timeout after ${MAX_WAIT}s — rolling back"
            docker service rollback "$SERVICE" || true
            exit 1
